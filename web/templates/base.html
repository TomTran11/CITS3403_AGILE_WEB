<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}UniApp{% endblock %}</title>

    <!-- Responsive meta tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% block styles %}{% endblock %}

    <!-- Base CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="{{ url_for('main.landing_page') }}" class="logo">
                <i class="bi bi-people-fill"></i>
                <span class="uni">Uni</span><span class="app">App</span>
            </a>
        </div>
        <div class="nav-right">
            {% if user %}
                <!-- Logged in -->
                <div class="profile-menu">
                    <button class="profile-icon-btn">
                        <div class="profile-avatar">
                            {{ user.displayname[0] | upper }}
                        </div>
                    </button>

                    <div class="profile-dropdown" id="profileDropdown">
                        <a href="{{ url_for('main.profile') }}">View Profile</a>
                        <a href="{{ url_for('main.edit_profile') }}">Edit Profile</a>
                        <a href="{{ url_for('main.account_settings') }}">Account Settings</a>
                        <div class="dropdown-divider"></div>
                        <a href="{{ url_for('auth.logout') }}" class="dropdown-logout">Logout</a>
                    </div>
                </div>

            {% else %}
                {% if title in ['Login', 'Sign Up'] %}
                    <!-- Login / Signup page → About only -->
                    <a href="{{ url_for('main.about') }}">About</a>
                {% else %}
                    <!-- Other pages (not logged in) -->
                    <a href="{{ url_for('main.about') }}">About</a>
                    <a href="{{ url_for('auth.login') }}">Login</a>
                    <a href="{{ url_for('auth.signup') }}" class="btn">Sign Up</a>
                {% endif %}
            {% endif %}
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="{% block wrapper_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/base.js') }}"></script>
    {% block scripts %}{% endblock %}

</body>
</html>
